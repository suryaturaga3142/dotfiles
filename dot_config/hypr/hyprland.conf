# ~/.config/hypr/hyprland.conf

# DEPRECATED FILE
# Keeping for reference but the lua file is very much 
# the default that needs to be used.

# This is custom but I'm getting some weird warning so 
# putting this comment here idk why this would help

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = fuzzel

$scripts_dir = /home/surya/.local/bin

env = TERMINAL,kitty

exec-once = hypridle
exec-once = blueman-applet
exec-once = waybar
exec-once = mako
exec-once = awww-daemon
exec-once = copyq

# keybinds
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, loginctl lock-session

# Waybar fix
bind = $mainMod, T, togglefloating,
bind = $mainMod, T, fullscreen, 1
bind = $mainMod SHIFT, T, togglefloating,
bind = $mainMod, F, fullscreen, 0

# applications
bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, Q, exec, code
bind = $mainMod, W, exec, google-chrome-stable --profile-directory="Default"
bind = $mainMod SHIFT, W, exec, google-chrome-stable --profile-directory="Profile 3"
bind = $mainMod, E, exec, snapshot
bind = $mainMod SHIFT, E, exec, [fullscreen] gimp
bind = $mainMod, A, exec, $menu
bind = $mainMod, S, exec, $fileManager
bind = $mainMod SHIFT, S, exec, filelight
bind = $mainMod, D, exec, google-chrome-stable --app=https://open.spotify.com --profile-directory="Default"
bind = $mainMod SHIFT, D, exec, $terminal -e spotatui
bind = $mainMod, V, exec, [float] copyq menu

# tasks
bind = $mainMod, B, exec, $scripts_dir/shuffle_wallpaper

# resizing windows
binde = $mainMod, left, resizeactive, -10 0
binde = $mainMod, right, resizeactive, 10 0
binde = $mainMod, up, resizeactive, 0 -10
binde = $mainMod, down, resizeactive, 0 10

# switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# focus windows
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move to previous/next workspace
bind = $mainMod, comma, workspace, m-1
bind = $mainMod, period, workspace, m+1

# Move current workspace left/right
bind = $mainMod SHIFT, comma, movetoworkspace, -1
bind = $mainMod SHIFT, period, movetoworkspace, +1

# media
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# volume
bindel = , XF86AudioRaiseVolume, exec, $scripts_dir/volume_brightness vol_up
bindel = , XF86AudioLowerVolume, exec, $scripts_dir/volume_brightness vol_down
bindel = , XF86AudioMute, exec, $scripts_dir/volume_brightness vol_mute

# brightness
bindel = , XF86MonBrightnessUp, exec, $scripts_dir/volume_brightness bright_up
bindel = , XF86MonBrightnessDown, exec, $scripts_dir/volume_brightness bright_down

# more
bind = , Print, exec, $scripts_dir/screenshot_menu
bind = SHIFT, Print, exec, $scripts_dir/screenshot_delay

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    left_handed = true

    scroll_method = on_button_down
    scroll_button = 274

    touchpad {
        natural_scroll = true
    }
}

# change monitor to high resolution, the last argument is the scale factor
# makes the zoom 2x, so avoid it pls
#monitor = , highres, auto, 2

# unscale XWayland (the key thing to fix pixelated apps running xwayland
xwayland {
  force_zero_scaling = true
}

# toolkit-specific scale
# I've gone and put it in the distrobox app launch scripts so they're not 
# needed here
#env = GDK_SCALE,2
#env = XCURSOR_SIZE,24

